<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xml:lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Happy Birthday දහමී!!</title>	    
    <link type="text/css" rel="stylesheet" href="file/default.css">
    <style>
        /* Hides everything at the start */
        #clock-box, #photos { 
            display: none; 
        }

        /* Aligns the clock section to the left, under your text */
        #clock-box {
            position: absolute;
            bottom: 40px;
            left: 50px; 
            width: auto;
            text-align: left;
            z-index: 50;
            color: #666;
            font-size: 14px;
        }

        /* Styles the ticking numbers */
        #clock {
            font-size: 20px;
            color: #ff3366;
            font-weight: bold;
            margin-top: 5px;
            font-family: "Courier New", Courier, monospace;
        }

        /* Container for photos positioned in the corners */
        #photos {
            position: absolute;
            bottom: 20px;
            width: 100%;
            z-index: 100;
        }

        #photos img {
            width: 120px; /* Slightly smaller to fit 6 comfortably */
            height: 150px; /* Fixed height for all */
            object-fit: cover; /* Crops the image to fit the frame */
            background-color: #fff;
            padding: 8px;
            padding-bottom: 25px; 
            border: 1px solid #ddd;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            position: absolute;
        }

        /* fanning out the left side */
#p1 { left: 5px;  transform: rotate(-10deg); z-index: 101; }
#p3 { left: 95px; transform: rotate(5deg); z-index: 102; } 
#p5 { left: 185px; transform: rotate(-5deg); z-index: 103; }

/* THE ZOOMED PHOTO (4th from left) */
        #p7 { 
            left: 275px;  
            z-index: 104; 
            transform: rotate(3deg);
            /* This property zooms the content without changing frame dimensions */
            object-fit: cover; 
            object-position: 50% 20%; /* Centers horizontally, zooms toward the top 20% */
        }

#p9 { left: 365px; transform: rotate(-8deg); z-index: 105; }        


/* fanning out the right side */
#p2 { right: 5px;  transform: rotate(10deg); z-index: 101; }
#p4 { right: 95px; transform: rotate(-5deg); z-index: 102; }
#p6 { right: 185px; transform: rotate(5deg); z-index: 103; }
#p8 { right: 275px; transform: rotate(-3deg); z-index: 104; }
#p10 { right: 365px; transform: rotate(8deg); z-index: 105; }

</style>
    <script type="text/javascript" src="file/jquery.min.js"></script>
    <script type="text/javascript" src="file/jscex.min.js"></script>
    <script type="text/javascript" src="file/jscex-parser.js"></script>
    <script type="text/javascript" src="file/jscex-jit.js"></script>
    <script type="text/javascript" src="file/jscex-builderbase.min.js"></script>
    <script type="text/javascript" src="file/jscex-async.min.js"></script>
    <script type="text/javascript" src="file/jscex-async-powerpack.min.js"></script>
    <script type="text/javascript" src="file/function.js" charset="utf-8"></script>
    <script type="text/javascript" src="file/love.js" charset="utf-8"></script>
    <script>
        function playAudio() {
            var audio = document.getElementById("myAudio");
            audio.play();
        }
    </script>
</head>
<body>
    <div id="main">
        <div id="error"><a href="http://www.google.cn/chrome/intl/zh-CN/landing_chrome.html?hl=zh-CN&brand=CHMI">Chrome</a> (<a href="http://firefox.com.cn/download/">Firefox</a>)</div>
        <audio autoplay="autoplay" height="100" width="100" id="myAudio">
            <source src="aud.mp3" type="audio/mp3" />
            <embed height="100" width="100" src="aud.mp3" />
        </audio>
        <div id="wrap">
            <div id="text">
                <div id="code">
                    <span class="say">දහමි නන්ගී.., 💞</span><br>
                    <span class="say"></span><br>
                    <span class="say">Happy 16th Birthday! 🎂</span><br>
                    <span class="say">May God bless you! 🍀</span><br>
                    <span class="say">And give u so much happiness 💕</span><br>
                    <span class="say">අන්තිමට 16කුත් උනා නේ... ❤️</span><br>
                    <span class="say">අනිවා හොදට වැඩ ටික කරගන්න.. 🤗</span><br>
                    <span class="say">OL ගොඩදාගන්න ඕනි.. .. 📖🤓</span><br>
                    <span class="say">හොදම දවසක් වේවා...  ❤️😘</span><br>
                    <span class="say"></span><br>
                    <span class="say">- Sayum Ayya😜🫠</span><br>

                </div>
            </div>
        <div id="clock-box">
            ඔයා අදට ඉපදිලා...👶🤱:
            <div id="clock"></div>
        </div>
            <div id="photos">
                <img src="photo1.jpg" id="p1">
                <img src="photo2.jpg" id="p2">
                <img src="photo3.jpg" id="p3">
                <img src="photo4.jpg" id="p4">
                <img src="photo5.jpg" id="p5">
                <img src="photo6.jpg" id="p6">
                <img src="photo7.jpg" id="p7">
                <img src="photo8.jpg" id="p8">
                <img src="photo9.jpg" id="p9">
                <img src="photo10.jpg" id="p10">
            </div>
            <canvas id="canvas" width="1100" height="680"></canvas>
        </div>
    </div>

    <script>
    (function() {
        var canvas = $('#canvas');
		
        if (!canvas[0].getContext) {
            $("#error").show();
            return false;
        }

        var width = canvas.width();
        var height = canvas.height();        
        canvas.attr("width", width);
        canvas.attr("height", height);

        var opts = {
            seed: {
                x: width / 2 - 20,
                color: "rgb(190, 26, 37)",
                scale: 2
            },
            branch: [
                [535, 680, 570, 250, 500, 200, 30, 100, [
                    [540, 500, 455, 417, 340, 400, 13, 100, [
                        [450, 435, 434, 430, 394, 395, 2, 40]
                    ]],
                    [550, 445, 600, 356, 680, 345, 12, 100, [
                        [578, 400, 648, 409, 661, 426, 3, 80]
                    ]],
                    [539, 281, 537, 248, 534, 217, 3, 40],
                    [546, 397, 413, 247, 328, 244, 9, 80, [
                        [427, 286, 383, 253, 371, 205, 2, 40],
                        [498, 345, 435, 315, 395, 330, 4, 60]
                    ]],
                    [546, 357, 608, 252, 678, 221, 6, 100, [
                        [590, 293, 646, 277, 648, 271, 2, 80]
                    ]]
                ]] 
            ],
            bloom: {
                num: 700,
                width: 1080,
                height: 650,
            },
            footer: {
                width: 1200,
                height: 5,
                speed: 10,
            }
        }

        var tree = new Tree(canvas[0], width, height, opts);
        var seed = tree.seed;
        var foot = tree.footer;
        var hold = 1;

        canvas.click(function(e) {
            playAudio();
            var offset = canvas.offset(), x, y;
            x = e.pageX - offset.left;
            y = e.pageY - offset.top;
            if (seed.hover(x, y)) {
                hold = 0; 
                canvas.unbind("click");
                canvas.unbind("mousemove");
                canvas.removeClass('hand');
            }
        }).mousemove(function(e) {
            var offset = canvas.offset(), x, y;
            x = e.pageX - offset.left;
            y = e.pageY - offset.top;
            canvas.toggleClass('hand', seed.hover(x, y));
        });

        // Set her birth date: (Year, Month [0-11], Day, Hour, Minute)
        var together = new Date();
        together.setFullYear(2010, 2, 16); // March is month 2 (0=Jan, 1=Feb)
        together.setHours(0);
        together.setMinutes(0);
        together.setSeconds(0);
        together.setMilliseconds(0);

        function updateClock() {
            var current = new Date();
            var seconds = (Date.parse(current) - Date.parse(together)) / 1000;
            var days = Math.floor(seconds / (3600 * 24));
            seconds %= 3600 * 24;
            var hours = Math.floor(seconds / 3600);
            if (hours < 10) hours = "0" + hours;
            seconds %= 3600;
            var minutes = Math.floor(seconds / 60);
            if (minutes < 10) minutes = "0" + minutes;
            seconds %= 60;
            if (seconds < 10) seconds = "0" + seconds;

            // This creates the text string for the clock
            var result = days + "d " + hours + "h " + minutes + "m " + seconds + "s"; 
            $("#clock").html(result);
        }

        var seedAnimate = eval(Jscex.compile("async", function () {
            seed.draw();
            while (hold) {
                $await(Jscex.Async.sleep(10));
            }
            while (seed.canScale()) {
                seed.scale(0.95);
                $await(Jscex.Async.sleep(10));
            }
            while (seed.canMove()) {
                seed.move(0, 2);
                foot.draw();
                $await(Jscex.Async.sleep(10));
            }
        }));

        var growAnimate = eval(Jscex.compile("async", function () {
            do {
                tree.grow();
                $await(Jscex.Async.sleep(10));
            } while (tree.canGrow());
        }));

        var flowAnimate = eval(Jscex.compile("async", function () {
            do {
                tree.flower(2);
                $await(Jscex.Async.sleep(10));
            } while (tree.canFlower());
        }));

        var moveAnimate = eval(Jscex.compile("async", function () {
            tree.snapshot("p1", 240, 0, 610, 680);
            while (tree.move("p1", 500, 0)) {
                foot.draw();
                $await(Jscex.Async.sleep(10));
            }
            foot.draw();
            tree.snapshot("p2", 500, 0, 610, 680);

            canvas.parent().css("background", "url(" + tree.toDataURL('image/png') + ")");
            canvas.css("background", "#ffe");
            $await(Jscex.Async.sleep(300));
            canvas.css("background", "none");
        }));

        var textAnimate = eval(Jscex.compile("async", function () {
            $("#code").show().typewriter();
    
            $await(Jscex.Async.sleep(35000)); 

            // Initialize and start the live clock
            updateClock(); 
            setInterval(updateClock, 1000);

            // Reveal the elements
            $("#clock-box").fadeIn(2000);
            $("#photos").fadeIn(3000); 
        }));
	    
        var runAsync = eval(Jscex.compile("async", function () {
            $await(seedAnimate());
            $await(growAnimate());
            $await(flowAnimate());
            $await(moveAnimate());
            textAnimate().start();
        }));

        runAsync().start();
    })();
    </script>
</body>
</html>
